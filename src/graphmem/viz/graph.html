<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphMem — Knowledge Graph</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
svg { width: 100vw; height: 100vh; display: block; }
.link { stroke: #30363d; stroke-width: 1.5; fill: none; }
.link:hover { stroke: #58a6ff; stroke-width: 2.5; }
.link-label { fill: #8b949e; font-size: 10px; pointer-events: none; }
.node circle { stroke: #0d1117; stroke-width: 2; cursor: grab; }
.node circle:hover { stroke: #58a6ff; stroke-width: 3; }
.node text { fill: #c9d1d9; font-size: 12px; font-weight: 600; pointer-events: none; }
.node:active circle { cursor: grabbing; }
#tooltip {
  position: fixed; display: none; background: #161b22; border: 1px solid #30363d;
  border-radius: 8px; padding: 12px 16px; max-width: 320px; font-size: 13px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 10; pointer-events: none;
}
#tooltip .name { font-size: 15px; font-weight: 700; color: #58a6ff; margin-bottom: 6px; }
#tooltip .summary { color: #8b949e; line-height: 1.4; }
#header {
  position: fixed; top: 16px; left: 16px; z-index: 5;
  background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  padding: 10px 16px; font-size: 13px;
}
#header h1 { font-size: 16px; color: #58a6ff; margin-bottom: 4px; }
#header .stats { color: #8b949e; }
.ws-status { font-size: 11px; margin-top: 4px; color: #8b949e; }
.ws-status.connected { color: #7ee787; }
marker { fill: #30363d; }
</style>
</head>
<body>
<div id="header">
  <h1>GraphMem</h1>
  <div class="stats" id="stats"></div>
  <div class="ws-status" id="ws-status"></div>
</div>
<div id="tooltip">
  <div class="name"></div>
  <div class="summary"></div>
</div>
<svg></svg>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const GRAPH_DATA = /*GRAPH_JSON*/{"nodes":[],"links":[]}/*END_GRAPH_JSON*/;
const WS_PORT = /*WS_PORT*/0/*END_WS_PORT*/;

const data = GRAPH_DATA;
document.getElementById('stats').textContent =
  `${data.nodes.length} entities, ${data.links.length} facts`;

const colors = ['#58a6ff','#f78166','#7ee787','#d2a8ff','#ff7b72','#79c0ff','#ffa657','#56d4dd'];
function nodeColor(i) { return colors[i % colors.length]; }

const svg = d3.select('svg');
const width = window.innerWidth;
const height = window.innerHeight;

svg.attr('viewBox', [0, 0, width, height]);

// Arrow marker
svg.append('defs').append('marker')
  .attr('id', 'arrow').attr('viewBox', '0 -5 10 10')
  .attr('refX', 20).attr('refY', 0)
  .attr('markerWidth', 6).attr('markerHeight', 6)
  .attr('orient', 'auto')
  .append('path').attr('d', 'M0,-5L10,0L0,5');

const g = svg.append('g');

// Groups for links, link labels, and nodes
const linkGroup = g.append('g');
const linkLabelGroup = g.append('g');
const nodeGroup = g.append('g');

// Zoom
svg.call(d3.zoom()
  .scaleExtent([0.1, 8])
  .on('zoom', (e) => g.attr('transform', e.transform)));

const simulation = d3.forceSimulation(data.nodes)
  .force('link', d3.forceLink(data.links).id(d => d.id).distance(140))
  .force('charge', d3.forceManyBody().strength(-400))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(40));

// Tooltip
const tooltip = document.getElementById('tooltip');
const tipName = tooltip.querySelector('.name');
const tipSummary = tooltip.querySelector('.summary');

function showTip(e, name, text) {
  tipName.textContent = name;
  tipSummary.textContent = text;
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}
function moveTip(e) {
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top = (e.clientY - 10) + 'px';
}
function hideTip() { tooltip.style.display = 'none'; }

function dragStart(e, d) {
  if (!e.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) {
  if (!e.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

function linkKey(d) {
  const s = d.source.id || d.source;
  const t = d.target.id || d.target;
  return `${s}-${t}`;
}

function renderGraph() {
  // Links
  const linkSel = linkGroup.selectAll('line').data(data.links, linkKey);
  linkSel.exit().remove();
  const linkEnter = linkSel.enter().append('line')
    .attr('class', 'link')
    .attr('marker-end', 'url(#arrow)');
  const linkMerged = linkEnter.merge(linkSel);

  linkMerged
    .on('mouseover', (e, d) => showTip(e, d.name, d.fact))
    .on('mousemove', moveTip)
    .on('mouseout', hideTip);

  // Link labels
  const llSel = linkLabelGroup.selectAll('text').data(data.links, linkKey);
  llSel.exit().remove();
  const llEnter = llSel.enter().append('text')
    .attr('class', 'link-label')
    .attr('text-anchor', 'middle');
  const llMerged = llEnter.merge(llSel);
  llMerged.text(d => d.name.length > 30 ? d.name.slice(0, 28) + '...' : d.name);

  // Nodes
  const nodeSel = nodeGroup.selectAll('g').data(data.nodes, d => d.id);
  nodeSel.exit().remove();
  const nodeEnter = nodeSel.enter().append('g')
    .attr('class', 'node')
    .call(d3.drag().on('start', dragStart).on('drag', dragging).on('end', dragEnd));
  nodeEnter.append('circle').attr('r', 14)
    .attr('fill', (d, i) => nodeColor(data.nodes.indexOf(d)));
  nodeEnter.append('text').attr('dx', 18).attr('dy', 4).text(d => d.name);
  const nodeMerged = nodeEnter.merge(nodeSel);

  nodeMerged
    .on('mouseover', (e, d) => showTip(e, d.name, d.summary || 'No summary'))
    .on('mousemove', moveTip)
    .on('mouseout', hideTip);

  // Update simulation
  simulation.nodes(data.nodes);
  simulation.force('link').links(data.links);

  // Tick handler
  simulation.on('tick', () => {
    linkMerged
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    llMerged
      .attr('x', d => (d.source.x + d.target.x) / 2)
      .attr('y', d => (d.source.y + d.target.y) / 2 - 6);
    nodeMerged.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// Initial render
renderGraph();

// --- Live Updates via WebSocket ---
function updateGraph(newData) {
  // Preserve positions for existing nodes
  const oldPos = new Map();
  data.nodes.forEach(n => oldPos.set(n.id, { x: n.x, y: n.y, vx: n.vx, vy: n.vy }));

  newData.nodes.forEach(n => {
    const old = oldPos.get(n.id);
    if (old) { n.x = old.x; n.y = old.y; n.vx = old.vx; n.vy = old.vy; }
  });

  data.nodes = newData.nodes;
  data.links = newData.links;

  document.getElementById('stats').textContent =
    `${data.nodes.length} entities, ${data.links.length} facts`;

  renderGraph();
  simulation.alpha(0.3).restart();
}

if (WS_PORT > 0) {
  const wsStatus = document.getElementById('ws-status');

  function connectWS() {
    const ws = new WebSocket(`ws://127.0.0.1:${WS_PORT}`);

    ws.onopen = () => {
      wsStatus.textContent = 'live';
      wsStatus.className = 'ws-status connected';
    };

    ws.onmessage = (event) => {
      try {
        updateGraph(JSON.parse(event.data));
      } catch (e) {
        console.error('Failed to parse graph update:', e);
      }
    };

    ws.onclose = () => {
      wsStatus.textContent = 'reconnecting...';
      wsStatus.className = 'ws-status';
      setTimeout(connectWS, 2000);
    };

    ws.onerror = () => ws.close();
  }

  connectWS();
}
</script>
</body>
</html>
